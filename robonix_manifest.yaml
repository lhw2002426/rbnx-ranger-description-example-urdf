manifestVersion: 1

build:
  script: scripts/build.sh

package:
  id: com.vendor.ranger_example_description
  name: ranger_example_description_rbnx
  version: 0.0.1
  vendor: vendor
  description: Ranger example description package for ROS2 launch only
  license: Apache-2.0

nodes:
  - id: com.vendor.ranger_example_description
    type: binary
    start: >
      source /opt/ros/humble/setup.bash &&
      source install/setup.bash &&
      exec bash scripts/start.sh
